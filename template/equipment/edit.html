{% extends 'base.html' %}

{% block title %}Edit Equipment{% endblock %}

{% block content %}
   <div>
    <form method="POST">
        {% csrf_token %}
        <h1>Edit Equipment</h1>
        <div class="row row-cols-sm-1 row-cols-md-2 gy-4 ">
           
            <div>
                <label for="category_id">Category</label>
                <select id="category_id" name="category_id" class="form-select"  required>
                    <option value="" disabled selected >Select Category</option>
                    {% for category in categories %}
                        <option value="{{ category.category_id }}">{{category.category_name}}</option>
                    {% endfor %}
                </select>
                <script>
                    document.getElementById("category_id").value="{{equipment.category_id}}";
                </script>
            </div>
            
            <div>
                <label for="equipment_name">Equipment Name</label>
                <input type="text" id="equipment_name" name="equipment_name" value="{{equipment.equipment_name}}" class="form-control"  required>
            </div>
            <div>
                <label for="serial_number">Serial Number</label>
                <input type="text" id="serial_number" name="serial_number" value="{{equipment.serial_number}}" class="form-control"  required>
            </div>
            <div>
                <label for="purchase_date">Purchase Date</label>
                <input type="date" id="purchase_date" name="purchase_date" value="{{equipment.purchase_date}}" class="form-control"  required>
            </div>
            <div>
                <label for="purchase_cost">Purchase Cost</label>
                <input type="number" id="purchase_cost" name="purchase_cost" value="{{equipment.purchase_cost}}" class="form-control"  required>
            </div>
            <div>
                <label for="current_status">Current Status</label>
                 <select name="current_status" id="current_status" class="form-select" required>
                    <option value="" disabled selected >Select Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">In Active</option>
                    <option value="maintenance">Maintenance</option>
                    <option value="retired">Retired</option>
                 </select>
                 <script>
                    document.getElementById("current_status").value="{{equipment.current_status}}";
                </script>
            </div>
            <div>
                <label for="location">Location</label>
                <input type="text" id="location" name="location" value="{{equipment.location}}" class="form-control"  required>
            </div>
            
        </div>
        <div class="mt-3">
               <button class="btn btn-primary btn-gradient rounded-5 ps-5 pe-5">Save</button>
            </div>
    </form>
   </div>
{% endblock %}
