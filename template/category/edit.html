{% extends 'base.html' %}

{% block title %}Edit Category{% endblock %}

{% block content %}
   <div>
    <form method="POST">
        {% csrf_token %}
        <h1>Edit Category</h1>
        <div class="row row-cols-sm-1 row-cols-md-2 gy-4 ">
           
            <div>
                <label for="category_name">Category Name</label>
                <input type="text" id="category_name" name="category_name" value="{{category.category_name}}" class="form-control"  required>
            </div>
            <div>
                <label for="description">Description</label>
                <textarea type="text" id="description" name="description"  class="form-control"  required>{{ category.description }}</textarea>
            </div>
            <div>
               <button class="btn btn-primary btn-gradient rounded-5 ps-5 pe-5"> Save Category</button>
            </div>
        </div>
    </form>
   </div>
{% endblock %}
